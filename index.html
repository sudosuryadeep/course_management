<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0d0d12;
    --paper: #f5f3ef;
    --mist: #e8e4dc;
    --sakura: #e8a4b8;
    --sakura-dark: #c4607e;
    --petal: #f9eef2;
    --slate: #3a3a4a;
    --ghost: #8a8a9a;
    --gold: #c8a96e;
    --gold-soft: #f0e4c8;
    --line: rgba(0,0,0,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* DECORATIVE TOP BAND */
  .top-band {
    height: 3px;
    background: linear-gradient(90deg, var(--sakura), var(--gold), var(--sakura));
    position: relative;
    z-index: 10;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER / HERO */
  .hero {
    padding: 56px 0 40px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: start;
    border-bottom: 0.5px solid var(--line);
    margin-bottom: 40px;
    animation: fadeUp 0.7s ease both;
  }

  /* AVATAR */
  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    flex-shrink: 0;
  }

  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--sakura), var(--gold), var(--sakura));
    animation: spin 8s linear infinite;
  }

  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--paper);
    border-radius: 50%;
  }

  .avatar {
    position: relative;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    z-index: 2;
  }

  .private-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 22px;
    height: 22px;
    background: var(--ink);
    border: 2px solid var(--paper);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
  }

  .private-badge svg { width: 10px; height: 10px; fill: var(--paper); }

  /* PROFILE INFO */
  .profile-info { padding-top: 4px; }

  .username-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .username {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--ghost);
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 16px;
    line-height: 1.1;
  }

  /* STATS ROW */
  .stats {
    display: flex;
    gap: 32px;
    margin-bottom: 16px;
  }

  .stat {
    text-align: left;
  }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ghost);
    font-weight: 300;
  }

  /* STATUS PILL */
  .status-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .pill-private {
    background: var(--mist);
    color: var(--slate);
    border: 0.5px solid rgba(0,0,0,0.1);
  }

  .pill-personal {
    background: var(--petal);
    color: var(--sakura-dark);
    border: 0.5px solid rgba(196,96,126,0.2);
  }

  .pill-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }

  /* SECTION HEADER */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.02em;
    color: var(--ink);
  }

  .post-count {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 0.06em;
  }

  /* POSTS GRID */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .post-card {
    position: relative;
    aspect-ratio: 1;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    background: var(--mist);
  }

  .post-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .post-card:hover img { transform: scale(1.06); }

  .post-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,18,0);
    transition: background 0.35s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .post-card:hover .post-overlay {
    background: rgba(13,13,18,0.62);
  }

  .overlay-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .post-card:hover .overlay-stat {
    opacity: 1;
    transform: translateY(0);
  }

  .overlay-stat:nth-child(2) { transition-delay: 0.05s; }

  .overlay-stat svg { width: 13px; height: 13px; fill: #fff; }

  /* VIDEO BADGE */
  .video-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 20px;
    height: 20px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .video-badge svg { width: 9px; height: 9px; fill: var(--ink); margin-left: 1px; }

  /* MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(13,13,18,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--paper);
    border-radius: 12px;
    max-width: 560px;
    width: 100%;
    overflow: hidden;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 0.5px solid rgba(0,0,0,0.1);
  }

  .modal-backdrop.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .modal-body {
    padding: 20px 24px 24px;
  }

  .modal-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .modal-stats {
    display: flex;
    gap: 16px;
  }

  .modal-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--slate);

  .modal-date {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--ghost);
    letter-spacing: 0.04em;
  }

  .modal-caption {
    font-size: 13px;
    line-height: 1.6;
    color: var(--slate);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;

  .modal-close svg { width: 14px; height: 14px; stroke: var(--ink); fill: none; stroke-width: 2; }

  .ornament {

  /* FOOTER */

    text-align: center;
    padding-top: 40px;
    border-top: 0.5px solid var(--line);
    margin-top: 48px;
    animation: fadeUp 0.7s 0.3s ease both;

    letter-spacing: 0.2em;
    color: var(--ghost);

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

    to { transform: rotate(360deg); }

];

const grid = document.getElementById('postsGrid');
const backdrop = document.getElementById('modalBackdrop');
const modalImg = document.getElementById('modalImg');
const modalLikes = document.getElementById('modalLikes');
const modalComments = document.getElementById('modalComments');
const modalDate = document.getElementById('modalDate');
const modalCaption = document.getElementById('modalCaption');

posts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'post-card';
  card.style.animationDelay = `${0.25 + i * 0.07}s`;
  card.style.animation = 'fadeUp 0.6s ease both';

  const img = document.createElement('img');
  img.src = p.img;
  img.alt = p.caption.slice(0, 40);
  img.loading = 'lazy';

  const overlay = document.createElement('div');
  overlay.className = 'post-overlay';
  overlay.innerHTML = `
    <div class="overlay-stat">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      ${p.likes}
    </div>
    <div class="overlay-stat">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      ${p.comments}
    </div>`;

  if (p.type === 'video') {
    const badge = document.createElement('div');
    badge.className = 'video-badge';
    badge.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    card.appendChild(badge);
  }

  card.appendChild(img);
  card.appendChild(overlay);

  card.addEventListener('click', () => openModal(p));
  grid.appendChild(card);
});

function openModal(p) {
  modalImg.src = p.img;
  modalLikes.textContent = p.likes;
  modalComments.textContent = p.comments;
  modalDate.textContent = p.date;
  modalCaption.textContent = p.caption;
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
